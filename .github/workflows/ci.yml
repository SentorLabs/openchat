name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
        env:
          # Vitest needs a DATABASE_URL even if tests mock it — use a dummy
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/openchat
          LLM_PROVIDER: groq
          LLM_MODEL: llama-3.3-70b-versatile
          LLM_API_KEY: test-key

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/openchat
          LLM_PROVIDER: groq
          LLM_MODEL: llama-3.3-70b-versatile
          LLM_API_KEY: test-key
