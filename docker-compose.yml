# OpenChat — Zero-config local setup
# Runs OpenChat + llama.cpp serving Gemma 3 (4B, Q4_K_M) with SQLite.
# No API key needed. Everything runs on your machine.
#
# Usage:
#   docker compose up
#
# First run downloads the Gemma 3 model (~2.5 GB). Subsequent starts are instant.
# Chat history is persisted in ./data/openchat.db (SQLite).

services:

  # ── llama.cpp server ─────────────────────────────────────────────────────────
  llm:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: openchat-llm
    volumes:
      - ./data/models:/models
    entrypoint:
      - sh
      - -c
      - |
        MODEL=/models/gemma-3-4b-it-Q4_K_M.gguf
        URL=https://huggingface.co/bartowski/gemma-3-4b-it-GGUF/resolve/main/gemma-3-4b-it-Q4_K_M.gguf
        if [ ! -f "$MODEL" ]; then
          echo "Downloading Gemma 3 4B model (~2.5 GB)..."
          wget -q --show-progress -O "$MODEL" "$URL"
        fi
        /llama-server \
          --model "$MODEL" \
          --host 0.0.0.0 \
          --port 8080 \
          --ctx-size 8192 \
          --n-predict 2048 \
          --threads 4
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── OpenChat ──────────────────────────────────────────────────────────────────
  openchat:
    build: .
    container_name: openchat-app
    ports:
      - "3000:3000"
    environment:
      # llama.cpp exposes an OpenAI-compatible API — use the openai provider
      LLM_PROVIDER: openai
      LLM_MODEL: gemma-3-4b-it-Q4_K_M
      LLM_API_KEY: "local"
      OPENAI_BASE_URL: http://llm:8080/v1
      # SQLite — no database server needed
      DATABASE_URL: /data/openchat.db
    volumes:
      - ./data:/data
    depends_on:
      llm:
        condition: service_healthy
